<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 30px;
        }
    </style>
</head>
<body>
    <form>
        <select id="colorSelect">
            <option>Red</option>
            <option>Green</option>
            <option>Black</option>
            <option>White</option>
        </select>
        <input type="button" value="Select and Remove" onclick="removeColor()">

    </form>

    <script>
        function removeColor(){
            let select = document.getElementById("colorSelect")
            let selectedIndex = select.selectedIndex;
            if(selectedIndex !== -1){
                select.remove(selectedIndex)
            }

        }
    </script>
</body>
</html>
